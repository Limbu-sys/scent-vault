<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="50%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="glass" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="url(#gold)" opacity="0.08"/>
  <!-- Bottle body -->
  <g filter="url(#glow)" transform="translate(256 268)">
    <path d="M-52 -120 C-52 -150 -28 -168 0 -168 C28 -168 52 -150 52 -120 L52 80 C52 108 28 128 0 128 C-28 128 -52 108 -52 80 Z" fill="url(#gold)" opacity="0.92"/>
    <rect x="-18" y="-188" width="36" height="36" rx="6" fill="url(#gold)"/>
    <rect x="-10" y="-210" width="20" height="24" rx="4" fill="url(#gold)" opacity="0.85"/>
    <path d="M-40 -80 L40 -80 L32 60 C32 75 18 88 0 88 C-18 88 -32 75 -32 60 Z" fill="url(#glass)"/>
    <!-- SV monogram -->
    <text x="0" y="18" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="600" fill="#0a0908" opacity="0.75">SV</text>
  </g>
  <!-- Decorative ring -->
  <circle cx="256" cy="256" r="200" stroke="url(#gold)" stroke-width="2" opacity="0.25" fill="none"/>
  <circle cx="256" cy="256" r="220" stroke="url(#gold)" stroke-width="1" opacity="0.12" fill="none"/>
</svg>
